<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Micro Apps | Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./shared/shell/shell.css" />
  <style>
    :root {
      color-scheme: light;
      --page-bg: #f6f7f2;
      --page-surface: #ffffff;
      --page-surface-alt: #f3f4ee;
      --line: #e2e7dd;
      --line-strong: #cfd7cb;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #65d19e;
      --accent-strong: #48b985;
      --accent-soft: #e5f7ee;
      --shadow: 0 20px 50px rgba(31, 41, 55, 0.08);
      --shadow-soft: 0 10px 28px rgba(31, 41, 55, 0.05);
      --radius-lg: 28px;
      --radius-md: 22px;
      --radius-sm: 16px;
      --max-width: 1240px;
      font-family: 'Manrope', system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body.home-theme {
      margin: 0;
      position: relative;
      color: var(--text);
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% -6%, rgba(219, 224, 233, 0.82), transparent 20%),
        linear-gradient(138deg, transparent 78%, rgba(230, 233, 238, 0.88) 78%, rgba(230, 233, 238, 0.88) 92%, transparent 92%),
        var(--page-bg);
      -webkit-font-smoothing: antialiased;
    }

    body.home-theme::before {
      content: '';
      position: fixed;
      inset: 68px auto auto 0;
      width: 34vw;
      max-width: 520px;
      height: 180px;
      border-radius: 50%;
      background: rgba(230, 234, 239, 0.85);
      filter: blur(10px);
      pointer-events: none;
      z-index: 0;
    }

    body.home-theme .app-frame {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 20px 56px;
      position: relative;
      z-index: 1;
    }

    .main-content {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 0;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 0 18px;
      background: rgba(246, 247, 242, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(226, 231, 221, 0.9);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #8c2f78, #d9426d);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 24px rgba(140, 47, 120, 0.18);
    }

    .site-nav,
    .nav-actions,
    .top-intro-meta,
    .hero-actions,
    .controls-row,
    .filters,
    .results-meta,
    .badge-row,
    .preview-window,
    .footer-links,
    .footer-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .site-header a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
    }

    .site-header a:hover,
    .site-header a:focus-visible {
      color: var(--text);
    }

    .nav-pill {
      border-radius: 999px;
      padding: 2px 7px;
      background: #ef476f;
      color: #fff;
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .nav-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 152px;
      padding: 12px 20px;
      border-radius: 999px;
      border: 2px solid var(--accent);
      color: var(--accent-strong);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 26px;
      align-items: end;
      padding-top: 18px;
    }

    .hero-copy {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border-radius: 999px;
      background: var(--page-surface);
      border: 1px solid var(--line);
      color: var(--muted);
      padding: 7px 12px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: var(--shadow-soft);
    }

    .hero h2 {
      margin: 0;
      max-width: 12ch;
      font-size: clamp(2.4rem, 4.5vw, 4.5rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      max-width: 54ch;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.7;
    }

    .top-intro-meta {
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      background: var(--page-surface);
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
      box-shadow: var(--shadow-soft);
    }

    .button.primary {
      border-color: transparent;
      background: linear-gradient(135deg, var(--accent), #7bd7a8);
      color: #fff;
    }

    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .stat-chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      padding: 10px 14px;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--muted);
      box-shadow: var(--shadow-soft);
    }

    .controls-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .search-input,
    .select-input {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: var(--page-surface-alt);
      color: var(--text);
      padding: 14px 16px;
      font: inherit;
    }

    .search-input {
      flex: 1;
      min-width: 220px;
    }

    .filter-chip {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--page-surface);
      color: var(--muted);
      font-weight: 600;
      padding: 9px 14px;
      cursor: pointer;
    }

    .filter-chip.active {
      background: var(--accent-soft);
      border-color: rgba(101, 209, 158, 0.48);
      color: var(--accent-strong);
    }

    .results-meta {
      justify-content: space-between;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .section-heading {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
      margin: 0 0 8px;
    }

    .section-heading h3 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .featured-label {
      color: var(--text);
      font-weight: 800;
    }

    .card-description {
      margin: 0;
      color: var(--muted);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 32px;
      width: 100%;
    }

    .app-card {
      border-radius: var(--radius-md);
      border: 1px solid rgba(226, 231, 221, 0.9);
      background: var(--page-surface);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .app-card:hover,
    .app-card:focus-within {
      transform: translateY(-4px);
      box-shadow: 0 24px 54px rgba(31, 41, 55, 0.12);
    }

    .thumb {
      width: 100%;
      min-height: 250px;
      overflow: hidden;
      background: linear-gradient(180deg, #f4f6fb, #eff7f3);
      position: relative;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .preview-art {
      height: 100%;
      padding: 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0)),
        linear-gradient(135deg, var(--preview-a), var(--preview-b));
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .preview-art::after {
      content: '';
      position: absolute;
      inset: auto -38px -58px auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
    }

    .preview-window {
      position: relative;
      z-index: 1;
      gap: 7px;
    }

    .preview-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.75);
    }

    .preview-canvas {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 20px;
      padding: 22px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
    }

    .preview-copy {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .preview-line {
      height: 10px;
      border-radius: 999px;
      background: rgba(169, 183, 224, 0.56);
      width: min(220px, 100%);
    }

    .preview-line.medium { width: 76%; }
    .preview-line.short { width: 58%; }

    .preview-pill {
      width: 80px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--preview-c), var(--preview-d));
    }

    .preview-orb {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(172, 186, 245, 0.78);
      color: #3744d0;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      font-size: 0.9rem;
      padding: 10px;
    }

    .card-body {
      padding: 24px 22px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .badge,
    .status-pill {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .badge {
      border: 1px solid transparent;
      background: #f1f5f9;
      color: var(--muted);
    }

    .badge.accent {
      background: var(--accent-soft);
      color: var(--accent-strong);
    }

    .badge.updated {
      background: #e8f8ef;
      color: #2f9964;
    }

    .badge.new {
      background: #fff1dd;
      color: #b96a17;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .card-title {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
    }

    .status-pill {
      border: 1px solid #d7dcf8;
      color: #5061a8;
      background: #f3f5ff;
      white-space: nowrap;
    }

    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.65;
    }

    .tag-line {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: auto;
    }

    .card-link {
      min-width: 162px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.85rem;
    }

    .footer-links {
      justify-content: space-between;
      color: var(--muted);
    }

    footer.app-footer {
      margin-top: 18px;
      padding: 18px 8px 0;
      border-top: 1px solid var(--line-strong);
      color: var(--muted);
      text-align: left;
    }

    .footer-links a {
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 40px 16px;
      border-radius: var(--radius-md);
      border: 1px dashed var(--line-strong);
      color: var(--muted);
      font-weight: 700;
      background: rgba(255, 255, 255, 0.82);
    }

    @media (max-width: 1080px) {
      .hero {
        grid-template-columns: 1fr;
      }

      .stats-row {
        justify-content: flex-start;
      }

      .site-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }

    @media (max-width: 720px) {
      body.home-theme .app-frame {
        padding: 0 14px 42px;
      }

      .site-header {
        gap: 14px;
      }

      .site-nav,
      .nav-actions,
      .controls-row,
      .results-meta,
      .footer-links {
        align-items: flex-start;
        flex-direction: column;
      }

      .hero h2 {
        max-width: none;
      }

      .controls-panel {
        padding: 18px;
      }

      .search-input,
      .select-input,
      .card-link,
      .nav-cta {
        width: 100%;
      }

      .card-grid {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .thumb {
        min-height: 220px;
      }

      .preview-canvas {
        grid-template-columns: 1fr;
      }

      .preview-orb {
        justify-self: start;
      }

      .card-footer {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script type="module">
    import { mountShell, registerServiceWorker } from './shared/shell/shell.js';
    import { formatDate } from './shared/utils/format.js';

    document.body.classList.add('home-theme');

    const manifestUrl = './apps/apps.json';
    const defaultThumb = './assets/images/thumbnails/app-placeholder.svg';

    const { content, frame } = mountShell({
      appTitle: 'Micro Apps',
      appTagline: 'Small apps, polished interactions, shared shell',
      navLinks: [
        { href: '#apps', label: 'Apps', current: true },
        { href: '#featured', label: 'Featured' },
        { href: 'https://github.com/brickfielder/micro-apps', label: 'GitHub' },
      ],
      includeHomeLink: false,
      includeHeader: false,
    });

    const main = frame.querySelector('.main-content');
    const footer = frame.querySelector('.app-footer');
    const header = document.createElement('header');
    header.className = 'site-header';
    header.innerHTML = `
      <div class="site-nav">
        <a class="brand-mark" href="./index.html" aria-label="Micro Apps home">MA</a>
        <a href="#featured">Featured</a>
        <a href="#apps">Apps</a>
        <a href="https://brickfielder.github.io/micro-apps/docs" target="_blank" rel="noreferrer">Resources</a>
        <a href="https://github.com/brickfielder/micro-apps" target="_blank" rel="noreferrer">GitHub</a>
        <a href="#apps">Explore <span class="nav-pill">Beta</span></a>
      </div>
      <div class="nav-actions">
        <a href="mailto:hello@example.com">My Account</a>
        <a class="nav-cta" href="#apps">Get Started</a>
      </div>
    `;
    frame.insertBefore(header, main);

    if (footer) {
      footer.innerHTML = `
        <div class="footer-links">
          <span>Built for fast practice and experimentation.</span>
          <div class="footer-actions">
            <a href="https://github.com/brickfielder/micro-apps" target="_blank" rel="noreferrer">GitHub</a>
            <a href="https://brickfielder.github.io/micro-apps/docs" target="_blank" rel="noreferrer">Docs</a>
            <a href="mailto:hello@example.com">Contact</a>
          </div>
        </div>
      `;
    }

    const hero = document.createElement('section');
    hero.className = 'hero';
    hero.innerHTML = `
      <div class="hero-copy">
        <span class="kicker">Curated app gallery</span>
        <h2>Discover focused micro-apps for quick skill building.</h2>
        <p>Browse a cleaner catalogue, scan the previews quickly, and jump straight into the apps that fit the session you want to run.</p>
        <div class="hero-actions">
          <a class="button primary" href="#featured">Browse featured</a>
          <a class="button" href="https://github.com/brickfielder/micro-apps" target="_blank" rel="noreferrer">View source</a>
        </div>
        <div class="top-intro-meta">
          <span>Fast launch flow</span>
          <span>Minimal setup</span>
          <span>Shared shell</span>
        </div>
      </div>
      <div>
        <div class="controls-panel" aria-label="Quick filters">
          <div class="stats-row" id="hero-stats"></div>
          <div class="controls-row">
            <input class="search-input" type="search" placeholder="Search by name, purpose, or tag" aria-label="Search apps" />
            <select class="select-input" aria-label="Sort apps">
              <option value="featured">Featured first</option>
              <option value="alpha">A to Z</option>
              <option value="recent">Recently updated</option>
              <option value="status">Status</option>
            </select>
          </div>
          <div class="filters" aria-label="Filter by category" role="group"></div>
          <div class="results-meta">
            <span id="result-count">Loading apps...</span>
            <span id="active-filter"></span>
          </div>
        </div>
      </div>
    `;

    const searchInput = hero.querySelector('.search-input');
    const sortSelect = hero.querySelector('select');
    const filtersBar = hero.querySelector('.filters');
    const resultCount = hero.querySelector('#result-count');
    const activeFilter = hero.querySelector('#active-filter');
    const statsRow = hero.querySelector('#hero-stats');

    content.appendChild(hero);

    const featuredSection = document.createElement('section');
    featuredSection.id = 'featured';
    featuredSection.innerHTML = `
      <div class="section-heading">
        <h3><span class="featured-label">Featured Apps</span></h3>
        <p class="card-description">Best first picks for most users.</p>
      </div>
      <div class="card-grid" id="featured-grid"></div>
    `;

    const appsSection = document.createElement('section');
    appsSection.id = 'apps';
    appsSection.innerHTML = `
      <div class="section-heading">
        <h3>All Apps</h3>
        <p class="card-description">Search, filter, and launch any available micro-app.</p>
      </div>
      <div class="card-grid" id="apps-grid"></div>
    `;

    content.append(featuredSection, appsSection);

    const featuredGrid = featuredSection.querySelector('#featured-grid');
    const appsGrid = appsSection.querySelector('#apps-grid');

    let allApps = [];
    let selectedTag = 'all';
    const previewThemes = [
      { a: '#f7ebe3', b: '#dfeee2', c: '#9ba7f4', d: '#d2b8ff' },
      { a: '#e9eef9', b: '#e7f5ee', c: '#6ec5d7', d: '#9dc7ff' },
      { a: '#f8eadf', b: '#f1f5e6', c: '#f4a85f', d: '#f7d67c' },
      { a: '#efe7f8', b: '#dcedf6', c: '#8d93ff', d: '#b9a6ff' },
      { a: '#e7f1ec', b: '#eef1fb', c: '#65c59d', d: '#99d7ba' },
    ];

    const sorters = {
      featured: (a, b) => Number(b.featured) - Number(a.featured) || sorters.recent(a, b),
      alpha: (a, b) => a.title.localeCompare(b.title),
      recent: (a, b) => new Date(b.lastUpdated) - new Date(a.lastUpdated),
      status: (a, b) => (a.status || '').localeCompare(b.status || ''),
    };

    function buildTagFilters(tags) {
      filtersBar.replaceChildren();
      const allButton = createTagButton('all', 'All categories');
      filtersBar.appendChild(allButton);
      tags.forEach((tag) => filtersBar.appendChild(createTagButton(tag, tag)));
    }

    function createTagButton(value, label) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'filter-chip' + (value === selectedTag ? ' active' : '');
      btn.textContent = label;
      btn.dataset.value = value;
      btn.addEventListener('click', () => {
        selectedTag = value;
        updateActiveFilter();
        render();
      });
      return btn;
    }

    function updateStats(apps) {
      statsRow.replaceChildren();
      const total = document.createElement('span');
      total.className = 'stat-chip';
      total.textContent = `${apps.length} total apps`;
      const featuredCount = document.createElement('span');
      featuredCount.className = 'stat-chip';
      featuredCount.textContent = `${apps.filter((app) => app.featured).length} featured`;
      const updated = document.createElement('span');
      updated.className = 'stat-chip';
      updated.textContent = `${apps.filter((app) => app.badge === 'Updated' || app.badge === 'New').length} new/updated`;
      statsRow.append(total, featuredCount, updated);
    }

    function updateActiveFilter() {
      activeFilter.textContent = selectedTag === 'all' ? 'Showing every category' : `Filtering by ${selectedTag}`;
      filtersBar.querySelectorAll('.filter-chip').forEach((chip) => {
        chip.classList.toggle('active', chip.dataset.value === selectedTag);
      });
    }

    function getPreviewTheme(app) {
      const key = `${app.slug}-${(app.tags || []).join('-')}`;
      const hash = Array.from(key).reduce((total, char) => total + char.charCodeAt(0), 0);
      return previewThemes[hash % previewThemes.length];
    }

    function getPreviewLabel(app) {
      return app.title
        .split(/[\s:]+/)
        .slice(0, 2)
        .map((part) => part[0])
        .join('')
        .toUpperCase();
    }

    function createPreview(app) {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';

      const usesRealThumb = app.thumbnail && app.thumbnail !== defaultThumb;
      if (usesRealThumb) {
        const img = document.createElement('img');
        img.src = app.thumbnail;
        img.alt = `${app.title} preview`;
        thumb.appendChild(img);
        return thumb;
      }

      const theme = getPreviewTheme(app);
      thumb.innerHTML = `
        <div class="preview-art" style="--preview-a:${theme.a}; --preview-b:${theme.b}; --preview-c:${theme.c}; --preview-d:${theme.d};">
          <div class="preview-window" aria-hidden="true">
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
            <span class="preview-dot"></span>
          </div>
          <div class="preview-canvas" aria-hidden="true">
            <div class="preview-copy">
              <div class="preview-line"></div>
              <div class="preview-line medium"></div>
              <div class="preview-line short"></div>
              <div class="preview-pill"></div>
            </div>
            <div class="preview-orb">${getPreviewLabel(app)}</div>
          </div>
        </div>
      `;
      return thumb;
    }

    function createCard(app) {
      const card = document.createElement('article');
      card.className = 'app-card';
      card.tabIndex = 0;

      const thumb = createPreview(app);

      const badges = document.createElement('div');
      badges.className = 'badge-row';
      if (app.featured) {
        const badge = document.createElement('span');
        badge.className = 'badge accent';
        badge.textContent = 'Featured';
        badges.appendChild(badge);
      }
      if (app.badge) {
        const badge = document.createElement('span');
        badge.className = 'badge ' + app.badge.toLowerCase();
        badge.textContent = app.badge;
        badges.appendChild(badge);
      }

      const body = document.createElement('div');
      body.className = 'card-body';

      const header = document.createElement('div');
      header.className = 'card-header';

      const title = document.createElement('h3');
      title.className = 'card-title';
      title.textContent = app.title;

      const status = document.createElement('span');
      status.className = 'status-pill';
      status.textContent = app.status || 'Ready';

      header.append(title, status);

      const description = document.createElement('p');
      description.className = 'meta';
      description.textContent = app.description;

      const tagLine = document.createElement('p');
      tagLine.className = 'tag-line';
      tagLine.textContent = (app.tags || []).join(' • ');

      const meta = document.createElement('p');
      meta.className = 'meta';
      meta.textContent = `Updated ${formatDate(app.lastUpdated)} · v${app.version || '1.0'}`;

      const footer = document.createElement('div');
      footer.className = 'card-footer';
      const availability = document.createElement('span');
      availability.className = 'badge';
      availability.textContent = app.offlineCapable ? 'Offline ready' : 'Browser launch';

      const launch = document.createElement('a');
      launch.className = 'button primary card-link';
      launch.href = app.entryPath;
      launch.target = '_blank';
      launch.rel = 'noreferrer';
      launch.textContent = 'Open app';

      footer.append(availability, launch);
      body.append(badges, header, description, tagLine, meta, footer);
      card.append(thumb, body);
      return card;
    }

    function renderFeatured(apps) {
      featuredGrid.replaceChildren();
      featuredSection.style.display = apps.length ? 'block' : 'none';
      apps.forEach((app) => featuredGrid.appendChild(createCard(app)));
    }

    function renderApps(apps) {
      appsGrid.replaceChildren();
      if (!apps.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No apps match this search or filter yet.';
        appsGrid.appendChild(empty);
        return;
      }
      apps.forEach((app) => appsGrid.appendChild(createCard(app)));
    }

    function render() {
      const query = searchInput.value.toLowerCase();
      const sortKey = sortSelect.value;

      const filtered = allApps.filter((app) => {
        const matchesQuery =
          app.title.toLowerCase().includes(query) ||
          app.description.toLowerCase().includes(query) ||
          (app.tags || []).some((tag) => tag.toLowerCase().includes(query));
        const matchesTag = selectedTag === 'all' || (app.tags || []).includes(selectedTag);
        return matchesQuery && matchesTag;
      });

      const sorted = [...filtered].sort(sorters[sortKey] || sorters.featured);
      const featuredApps = sorted.filter((app) => app.featured).slice(0, 4);
      const featuredSlugs = new Set(featuredApps.map((app) => app.slug));
      const mainApps = sorted.filter((app) => !featuredSlugs.has(app.slug));

      resultCount.textContent = `${filtered.length} app${filtered.length === 1 ? '' : 's'} shown`;
      renderFeatured(featuredApps);
      renderApps(mainApps);
      updateActiveFilter();
    }

    async function loadApps() {
      try {
        const response = await fetch(manifestUrl);
        if (!response.ok) throw new Error('Could not load apps manifest');
        allApps = await response.json();

        const uniqueTags = Array.from(new Set(allApps.flatMap((app) => app.tags || []))).sort();
        buildTagFilters(uniqueTags);
        updateActiveFilter();
        updateStats(allApps);
        render();
      } catch (error) {
        console.error(error);
        resultCount.textContent = 'Failed to load apps';
        const errorState = document.createElement('div');
        errorState.className = 'empty-state';
        errorState.textContent = 'The manifest could not be loaded. Please try again later.';
        appsGrid.replaceChildren(errorState);
        featuredGrid.replaceChildren();
      }
    }

    searchInput.addEventListener('input', render);
    sortSelect.addEventListener('change', render);

    loadApps();
    registerServiceWorker();
  </script>
</body>
</html>
